image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.3.28"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 2
    memory: 3Gi
  requests:
    cpu: 200m
    memory: 512Mi

# nodeOptions configures Node.js runtime options for the gateway container.
# maxOldSpaceSize sets --max-old-space-size (in MiB) via NODE_OPTIONS,
# causing Node.js to exit gracefully before the kernel OOM killer fires.
# Set to 0 to disable.
nodeOptions:
  maxOldSpaceSize: 2560

service:
  type: ClusterIP
  port: 18789

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi

config:
  gateway:
    port: 18789
    mode: local
    controlUi:
      allowedOrigins:
        - "*"
    trustedProxies:
      - "10.0.0.1"
  
  browser:
    enabled: false
  
  agents:
    defaults:
      workspace: /home/node/.openclaw/workspace
      userTimezone: UTC
      timeoutSeconds: 600
      maxConcurrent: 1
    list:
      - id: main
        default: true
        identity:
          name: OpenClaw
          emoji: "🦞"
  
  session:
    scope: per-sender
    store: /home/node/.openclaw/sessions
    reset:
      mode: idle
      idleMinutes: 60
  
  logging:
    level: info
    consoleLevel: info
    consoleStyle: compact
    redactSensitive: tools
  
  tools:
    profile: full
    web:
      search:
        enabled: false
      fetch:
        enabled: true

skills:
  - weather
  - gog

gateway:
  token:
    generate: true    # auto-generate gateway token Secret on install, retained on uninstall
    secretName: ""    # override secret name if generate=false

env: {}
  # EXAMPLE_VAR: "value"

# envFrom allows injecting environment variables from Secrets or ConfigMaps
# Example:
# envFrom:
#   - secretRef:
#       name: openclaw-api-keys
#   - configMapRef:
#       name: openclaw-config
envFrom: []

# nodeSelector constrains the pod to nodes with matching labels
# Example: { disktype: ssd }
nodeSelector: {}

# tolerations allow scheduling onto tainted nodes
tolerations: []

# affinity defines advanced node/pod scheduling rules
affinity: {}

# extraContainers adds sidecar containers to the pod.
# Example:
# extraContainers:
#   - name: skill-executor
#     image: ghcr.io/你/openclaw-skills:latest
#     imagePullPolicy: Always
#     livenessProbe:
#       httpGet:
#         path: /healthz
#         port: 8080
#         host: 127.0.0.1
#       periodSeconds: 30
#     volumeMounts:
#       - name: data
#         mountPath: /credentials
#         subPath: credentials
extraContainers:
  - name: skill-executor
    image: ghcr.io/liuyanzhi3535/openclaw-skills:latest
    imagePullPolicy: Always
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
        host: 127.0.0.1
      initialDelaySeconds: 10
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080
        host: 127.0.0.1
      initialDelaySeconds: 5
      periodSeconds: 10
