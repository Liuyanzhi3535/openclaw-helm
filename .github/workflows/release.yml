name: Release Charts
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/openclaw-helm/Chart.yaml"
      - "charts/openclaw-helm/values.yaml"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI registry
        run: |
          VERSION=$(grep '^version:' charts/openclaw-helm/Chart.yaml | awk '{print $2}')
          echo "Pushing chart version: ${VERSION}"
          helm package charts/openclaw-helm
          helm push openclaw-helm-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}
          echo "Done: ghcr.io/${{ github.repository_owner }}/openclaw-helm:${VERSION}"
