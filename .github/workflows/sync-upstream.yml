name: Sync Upstream Fork
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Sync from upstream
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote add upstream https://github.com/thepagent/openclaw-helm.git
          git fetch upstream

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date."
            exit 0
          fi

          git config user.name "thepagent"
          git config user.email "thepagent@users.noreply.github.com"
          git merge upstream/main --no-edit
          git push origin main
          echo "Synced upstream changes."
